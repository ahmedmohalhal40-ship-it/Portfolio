<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المحرك المحاسبي لدمج الأراضي</title>
    <style>
        /* تصميم العلامة المائية الفخمة A.M */
        .watermark {
            position: fixed;
            top: 25px;
            right: 30px;
            font-family: 'Georgia', serif; /* خط كلاسيكي فخم */
            font-size: 32px;
            font-weight: 900;
            z-index: 9999;
            pointer-events: none;
            user-select: none;
            
            /* تدرج لوني ذهبي فخم */
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
            opacity: 0.6;

            /* تأثير الحركة العائمة */
            animation: floatGold 4s ease-in-out infinite;
            border: 1px solid rgba(191, 149, 63, 0.3);
            padding: 5px 20px;
            border-radius: 50px;
        }

        @keyframes floatGold {
            0% { transform: translateY(0px) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(-5deg); }
        }

        /* تنسيقات الموقع الأساسية */
        :root { --primary: #1a252f; --secondary: #27ae60; --accent: #b38728; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); padding: 20px; margin: 0; }
        
        .container { 
            max-width: 1000px; 
            margin: 50px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border-top: 8px solid var(--accent); /* برواز علوي ذهبي ليتماشى مع العلامة */
        }

        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header p { color: #7f8c8d; margin-top: 0; }

        .setup-box { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            background: #fdfdfd; 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #eee;
            margin-bottom: 25px;
        }

        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #34495e; font-size: 0.9em; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #dcdde1; 
            border-radius: 8px; 
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 8px rgba(179, 135, 40, 0.2); }

        .btn-calc { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, var(--primary), #2c3e50); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1em; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-calc:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        th { background-color: var(--primary); color: white; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        
        .result-section { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h3 { color: var(--accent); border-right: 5px solid var(--accent); padding-right: 15px; margin-top: 40px; }
    </style>
</head>
<body>

    <div class="watermark">A.M</div>

    <div class="container">
        <div class="header" style="text-align: center;">
            <h1>النظام المحاسبي</h1>
            <p>نظام توحيد القوائم المالية للأراضي (IFRS 10)</p>
        </div>

        <div class="setup-box">
            <div class="input-group">
                <label>نسبة السيطرة للقابضة (%)</label>
                <input type="number" id="ownership" value="80">
            </div>
            <div class="input-group">
                <label>التكلفة الأصلية (دفاتر القابضة)</label>
                <input type="number" id="origCost" value="170000">
            </div>
            <div class="input-group">
                <label>سعر البيع للتابعة</label>
                <input type="number" id="internalPrice" value="200000">
            </div>
            <div class="input-group">
                <label>العملة المستخدمة</label>
                <input type="text" id="currency" value="دينار">
            </div>
        </div>

        <div style="background: #fff9f0; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #ffeaa7;">
            <label style="font-weight: bold; color: #d35400;">المرحلة المحاسبية المطلوب تحليلها:</label>
            <div class="setup-box" style="background: transparent; border: none; padding: 10px 0 0 0; margin-bottom: 0;">
                <select id="yearStatus" style="background: white;">
                    <option value="sale">سنة البيع الداخلي (إلغاء أرباح/خسائر)</option>
                    <option value="hold">سنة احتفاظ (تعديل أرصدة أول المدة)</option>
                    <option value="exit">سنة البيع الخارجي (تحقق الأرباح للمجموعة)</option>
                </select>
                <input type="number" id="subProfit" placeholder="صافي ربح التابعة للسنة">
                <div id="extPriceGroup" style="display:none;">
                    <input type="number" id="extPrice" placeholder="سعر البيع النهائي للخارج">
                </div>
            </div>
        </div>

        <button class="btn-calc" onclick="calculate()">تحليل العملية وإصدار القيود</button>

        <div id="results" class="result-section">
            <div id="outputContent"></div>
        </div>
    </div>

<script>
    document.getElementById('yearStatus').addEventListener('change', function() {
        document.getElementById('extPriceGroup').style.display = (this.value === 'exit') ? 'block' : 'none';
    });

    function calculate() {
        const own = document.getElementById('ownership').value / 100;
        const cost = parseFloat(document.getElementById('origCost').value);
        const sellIn = parseFloat(document.getElementById('internalPrice').value);
        const subProfit = parseFloat(document.getElementById('subProfit').value) || 0;
        const status = document.getElementById('yearStatus').value;
        const curr = document.getElementById('currency').value;
        const extPrice = parseFloat(document.getElementById('extPrice').value) || 0;

        const diff = sellIn - cost;
        const absDiff = Math.abs(diff);
        const isProfit = diff > 0;

        let html = "";
        let finalIncome = subProfit * own;
        let entry = "";
        let landVal = (status === 'exit') ? 0 : cost;

        // منطق الحساب العام
        if(status === 'sale') {
            finalIncome -= diff;
            entry = isProfit ? 
                `<tr><td>${absDiff}</td><td></td><td>من ح/ مكاسب بيع أراضي</td></tr><tr><td></td><td>${absDiff}</td><td>إلى ح/ الأراضي</td></tr>` :
                `<tr><td>${absDiff}</td><td></td><td>من ح/ الأراضي</td></tr><tr><td></td><td>${absDiff}</td><td>إلى ح/ خسائر بيع أراضي</td></tr>`;
        } else if(status === 'hold') {
            entry = isProfit ? 
                `<tr><td>${absDiff}</td><td></td><td>من ح/ الاستثمار (أرباح محتجزة)</td></tr><tr><td></td><td>${absDiff}</td><td>إلى ح/ الأراضي</td></tr>` :
                `<tr><td>${absDiff}</td><td></td><td>من ح/ الأراضي</td></tr><tr><td></td><td>${absDiff}</td><td>إلى ح/ الاستثمار (أرباح محتجزة)</td></tr>`;
        } else {
            finalIncome += diff;
            entry = isProfit ? 
                `<tr><td>${absDiff}</td><td></td><td>من ح/ الاستثمار في التابعة</td></tr><tr><td></td><td>${absDiff}</td><td>إلى ح/ مكاسب بيع أراضي (محققة)</td></tr>` :
                `<tr><td>${absDiff}</td><td></td><td>من ح/ خسائر بيع أراضي (محققة)</td></tr><tr><td></td><td>${absDiff}</td><td>إلى ح/ الاستثمار في التابعة</td></tr>`;
        }

        html += `<h3>1. تحليل حصة القابضة في الدخل</h3>
        <table>
            <tr><th>البيان</th><th>القيمة (${curr})</th></tr>
            <tr><td>حصة القابضة من أرباح التابعة الفردية</td><td>${(subProfit * own).toLocaleString()}</td></tr>
            <tr><td>أثر التعديلات (تسويات الأراضي)</td><td>${(status === 'hold' ? 0 : (isProfit ? -absDiff : absDiff)).toLocaleString()}</td></tr>
            <tr style="background:#f9f9f9"><td><b>صافي الدخل الموحد المنسوب للقابضة</b></td><td><b>${finalIncome.toLocaleString()}</b></td></tr>
        </table>`;

        html += `<h3>2. قيود التسوية (قيد ورقة العمل)</h3>
        <table>
            <tr><th>مدين</th><th>دائن</th><th>البيان</th></tr>
            ${entry}
        </table>`;

        html += `<h3>3. القيم الظاهرة بالقوائم الموحدة</h3>
        <table>
            <tr><th>البند</th><th>رصيد دفاتر المالك الحالي</th><th>الرصيد الموحد (النهائي)</th></tr>
            <tr><td>الأراضي</td><td>${status === 'exit' ? 0 : sellIn}</td><td>${landVal}</td></tr>
            <tr><td>أرباح/خسائر العملية</td><td>${status === 'sale' ? diff : (status === 'exit' ? (extPrice - sellIn) : 0)}</td><td>${status === 'exit' ? (extPrice - cost) : 0}</td></tr>
        </table>`;

        document.getElementById('outputContent').innerHTML = html;
        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
