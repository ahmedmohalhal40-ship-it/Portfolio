<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | Ahmed Mohalhal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #f4f7f6;
            --accent-color: #007bff;
            --text-dark: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--secondary-color);
            color: var(--text-dark);
        }

        header {
            background: white;
            padding: 2.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .back-btn {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .section-title {
            color: var(--primary-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
            margin: 2.5rem 0 1.5rem;
            font-size: 1.4rem;
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .cert-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cert-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .cert-card i {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        .cert-card span {
            font-size: 0.9rem;
            font-weight: 500;
            color: #444;
        }

        /* Preview Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
        }

        .modal-content {
            width: 90%; height: 85%;
            margin: 2% auto;
            background: white;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 20px;
            color: white; font-size: 30px; cursor: pointer;
            z-index: 1001;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <h1>Certificates Portfolio</h1>
        <p>Click to view full certificate details</p>
    </header>

    <div class="container">
        
        <h2 class="section-title">CIB Partnership Certificates</h2>
        <div class="cert-grid">
            <div class="cert-card" onclick="openPDF('الشهادات/CIB/اسم_الملف_هنا.pdf')">
                <i class="fas fa-university"></i>
                <span>Banking Operations</span>
            </div>
        </div>

        <h2 class="section-title">General Certificates</h2>
        <div class="cert-grid">
            <div class="cert-card" onclick="openPDF('الشهادات/ICDL.pdf')">
                <i class="fas fa-award"></i>
                <span>ICDL Certificate</span>
            </div>
            <div class="cert-card" onclick="openPDF('الشهادات/Accounting_Basics.pdf')">
                <i class="fas fa-calculator"></i>
                <span>Accounting Principles</span>
            </div>
        </div>

    </div>

    <div id="pdfModal" class="modal">
        <span class="close-btn" onclick="closePDF()">&times;</span>
        <div class="modal-content">
            <iframe id="pdfFrame" src=""></iframe>
        </div>
    </div>

    <script>
        function openPDF(path) {
            document.getElementById('pdfFrame').src = path + "#toolbar=0";
            document.getElementById('pdfModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }
        function closePDF() {
            document.getElementById('pdfModal').style.display = "none";
            document.getElementById('pdfFrame').src = "";
            document.body.style.overflow = "auto";
        }
        window.onclick = function(e) {
            if (e.target.className == 'modal') closePDF();
        }
    </script>

    <footer>
        <p style="text-align:center; color:#999; margin-top:4rem;">&copy; 2026 Ahmed Mohalhal</p>
    </footer>

</body>
</html>
